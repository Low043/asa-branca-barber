version: '3.8'
services:
  db-dev:
    image: postgres:15
    container_name: barber-postgres-dev
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: barber_dev_db
    volumes:
      - barber-db-data:/var/lib/postgresql/data

volumes:
  barber-db-data: